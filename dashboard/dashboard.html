<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propello AI — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F5F4;
  --surface:#FFFFFF;
  --surface2:#FAFAF9;
  --surface3:#F2F2F0;
  --border:#E5E5E2;
  --border2:#D1D1CE;
  --text1:#141412;
  --text2:#6B6B67;
  --text3:#A8A8A4;
  --accent:#141412;
  --accent-sub:rgba(20,20,18,0.06);
  --hot:#C62828;--hot-bg:#FDF2F2;--hot-br:#F5C6C6;
  --warm:#A16207;--warm-bg:#FDFAF0;--warm-br:#F0E0A0;
  --cold:#1D4ED8;--cold-bg:#F0F4FE;--cold-br:#C3D3FB;
  --green:#15803D;--green-bg:#F0FDF4;
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono','SF Mono','Courier New',monospace;
  --r:6px;--r2:8px;--r3:12px;
  --sh:0 1px 2px rgba(0,0,0,0.04),0 1px 4px rgba(0,0,0,0.03);
  --sh2:0 4px 16px rgba(0,0,0,0.08),0 2px 6px rgba(0,0,0,0.04);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);font-size:14px;color:var(--text1);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.app{display:grid;grid-template-columns:236px 1fr;height:100vh}

/* ── SIDEBAR ─────────────────────────── */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-top{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;background:var(--text1);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-mark i{font-size:15px;color:#fff}
.brand-text{}
.brand-name{font-size:14.5px;font-weight:700;color:var(--text1);letter-spacing:-0.3px;line-height:1.1}
.brand-tag{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:0.05em;margin-top:2px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-grp{font-size:9.5px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.1em;padding:12px 8px 4px;font-weight:500}
.nav-btn{width:100%;display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);border:none;background:transparent;cursor:pointer;color:var(--text2);font-size:13px;font-weight:450;font-family:var(--font);transition:background 0.1s,color 0.1s;margin-bottom:1px;text-align:left;position:relative;letter-spacing:-0.1px}
.nav-btn:hover{background:var(--surface3);color:var(--text1)}
.nav-btn.active{background:var(--accent-sub);color:var(--text1);font-weight:600}
.nav-btn.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:14px;background:var(--accent);border-radius:0 2px 2px 0}
.nav-btn i{font-size:14px;flex-shrink:0;width:16px;opacity:0.65}
.nav-btn.active i,.nav-btn:hover i{opacity:1}
.nav-badge{margin-left:auto;background:var(--hot-bg);color:var(--hot);font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;font-family:var(--mono);border:1px solid var(--hot-br)}
.sb-foot{padding:10px 8px 16px;border-top:1px solid var(--border)}
.conn-pill{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--surface2);border-radius:var(--r);border:1px solid var(--border)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot.on{background:var(--green);animation:pulse 2.5s ease-in-out infinite}
.dot.off{background:var(--hot)}
.dot.demo{background:var(--text3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
.conn-label{font-size:11px;color:var(--text2);font-family:var(--mono)}

/* ── MAIN ────────────────────────────── */
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;min-height:52px;padding:0 22px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.pg-title{font-size:15px;font-weight:600;color:var(--text1);letter-spacing:-0.2px}
.pg-sub{font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.top-right{display:flex;gap:5px;align-items:center}
.content{flex:1;overflow-y:auto;padding:20px 22px}

/* ── BUTTONS ─────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;font-family:var(--font);transition:all 0.1s;white-space:nowrap;letter-spacing:-0.1px;line-height:1}
.btn-primary{background:var(--text1);color:#fff;border-color:var(--text1)}
.btn-primary:hover{background:#2a2a28}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border2)}
.btn-ghost:hover{background:var(--surface3);color:var(--text1)}
.btn-danger{background:var(--hot-bg);color:var(--hot);border-color:var(--hot-br)}
.btn-danger:hover{background:#FAE0E0}
.btn-sm{padding:5px 10px;font-size:11px}
.btn:disabled{opacity:0.38;cursor:not-allowed}
.btn i{font-size:13px}

/* ── CARDS ───────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh)}
.card-hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3)}
.card-bd{padding:16px}

/* ── STAT CARDS ──────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px;box-shadow:var(--sh);transition:box-shadow 0.15s,transform 0.15s}
.stat:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.stat-label{font-size:11px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;font-weight:500}
.stat-val{font-size:28px;font-weight:700;font-family:var(--mono);color:var(--text1);line-height:1;letter-spacing:-1.5px}
.stat-meta{font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--mono)}

/* ── GRID ────────────────────────────── */
.g2{display:grid;grid-template-columns:196px 1fr;gap:12px;margin-bottom:18px}

/* ── TABLE ───────────────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--surface2);font-family:var(--mono);white-space:nowrap}
tbody tr{cursor:pointer;transition:background 0.08s}
tbody tr:hover td{background:var(--surface2)}
tbody td{padding:11px 14px;font-size:13px;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
tbody tr:last-child td{border-bottom:none}
.td-name{color:var(--text1)!important;font-weight:500}

/* ── BADGES ──────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;font-family:var(--mono);letter-spacing:0.04em}
.b-hot {background:var(--hot-bg);color:var(--hot);border:1px solid var(--hot-br)}
.b-warm{background:var(--warm-bg);color:var(--warm);border:1px solid var(--warm-br)}
.b-cold{background:var(--cold-bg);color:var(--cold);border:1px solid var(--cold-br)}
.b-tag{background:var(--surface3);color:var(--text2);border:1px solid var(--border);font-size:9px;padding:1px 6px}

/* ── SCORE BAR ───────────────────────── */
.sc-row{display:flex;align-items:center;gap:6px;min-width:96px}
.sc-n{font-size:11px;font-weight:500;font-family:var(--mono);min-width:22px;color:var(--text2)}
.sc-bar{flex:1;height:3px;background:var(--surface3);border-radius:2px}
.sc-fill{height:3px;border-radius:2px}

/* ── FORM ────────────────────────────── */
.form-field{margin-bottom:13px}
.form-label{font-size:11px;color:var(--text2);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.07em;display:block;margin-bottom:5px;font-weight:600}
input,textarea,select{background:var(--surface2);border:1px solid var(--border2);color:var(--text1);border-radius:var(--r);padding:8px 11px;font-size:13px;font-family:var(--font);outline:none;width:100%;transition:border-color 0.12s,box-shadow 0.12s;letter-spacing:-0.1px}
input:focus,textarea:focus,select:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px rgba(20,20,18,0.07)}
input::placeholder,textarea::placeholder{color:var(--text3)}
textarea{resize:vertical;min-height:88px;line-height:1.55}
select option{background:var(--surface)}
.inp-wrap{position:relative}
.inp-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.inp-wrap input{padding-left:31px}

/* ── CHIPS ───────────────────────────── */
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text3);font-size:11px;font-weight:500;cursor:pointer;font-family:var(--mono);transition:all 0.1s}
.chip:hover{color:var(--text1);border-color:var(--border2);background:var(--surface3)}
.chip.c-all{background:var(--surface3);color:var(--text1);border-color:var(--border2)}
.chip.c-hot{background:var(--hot-bg);color:var(--hot);border-color:var(--hot-br)}
.chip.c-warm{background:var(--warm-bg);color:var(--warm);border-color:var(--warm-br)}
.chip.c-cold{background:var(--cold-bg);color:var(--cold);border-color:var(--cold-br)}

/* ── MODAL ───────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(3px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);width:100%;max-width:580px;max-height:90vh;display:flex;flex-direction:column;animation:fade-in 0.16s ease;box-shadow:var(--sh2)}
@keyframes fade-in{from{opacity:0;transform:translateY(8px) scale(0.98)}to{opacity:1;transform:none}}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;gap:12px}
.modal-hd-title{font-size:14px;font-weight:600;color:var(--text1);letter-spacing:-0.2px}
.modal-hd-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.modal-bd{padding:20px;overflow-y:auto;flex:1}
.modal-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:6px;flex-shrink:0;background:var(--surface2);border-radius:0 0 var(--r3) var(--r3)}
.x-btn{background:transparent;border:1px solid var(--border);color:var(--text3);width:26px;height:26px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all 0.1s}
.x-btn:hover{background:var(--surface3);color:var(--text1);border-color:var(--border2)}

/* ── CHAT ────────────────────────────── */
.chat-log{display:flex;flex-direction:column;gap:8px}
.cm{display:flex;flex-direction:column}
.cm.user{align-items:flex-end}
.cm.assistant{align-items:flex-start}
.cb{padding:8px 12px;border-radius:8px;max-width:84%;font-size:12px;line-height:1.6;color:var(--text2)}
.cm.user .cb{background:var(--surface3);border:1px solid var(--border);border-radius:8px 8px 2px 8px;color:var(--text1)}
.cm.assistant .cb{background:var(--surface2);border:1px solid var(--border);border-radius:2px 8px 8px 8px}
.cm-meta{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px}

/* ── PROFILE GRID ────────────────────── */
.pf-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:14px}
.pf-item{background:var(--surface2);border-radius:var(--r);padding:9px 12px;border:1px solid var(--border)}
.pf-key{font-size:9.5px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:3px;font-weight:500}
.pf-val{font-size:12.5px;font-weight:500;color:var(--text1)}

/* ── TOAST ───────────────────────────── */
.toast{position:fixed;bottom:18px;right:18px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:10px 15px;display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text1);z-index:200;animation:fade-in 0.16s ease;box-shadow:var(--sh2)}
.toast.ok i{color:var(--green)}
.toast.err i{color:var(--hot)}

/* ── MISC ────────────────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:13px;height:13px;border:1.5px solid var(--border2);border-top-color:var(--text1);border-radius:50%;animation:spin 0.55s linear infinite}
.empty{text-align:center;padding:44px 20px;color:var(--text3)}
.empty i{font-size:26px;display:block;margin-bottom:8px;color:var(--border2)}
.empty p{font-size:12.5px}
.sect-label{font-size:10px;color:var(--text2);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:7px;font-weight:600}
.notice{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:9px 13px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px;margin-bottom:14px}
.notice i{color:var(--text3);flex-shrink:0}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ── SETTINGS TABS ───────────────────── */
.stab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;gap:0}
.stab{padding:8px 16px;border:none;background:transparent;font-size:12.5px;font-weight:500;color:var(--text3);font-family:var(--font);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.12s;display:flex;align-items:center;gap:6px;letter-spacing:-0.1px}
.stab:hover{color:var(--text2)}
.stab.active{color:var(--text1);border-bottom-color:var(--text1);font-weight:600}
.stab i{font-size:13px}

/* ── LOGIN PAGE ──────────────────────── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:36px 32px;width:100%;max-width:380px;box-shadow:var(--sh2)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.login-logo-mark{width:36px;height:36px;background:var(--text1);border-radius:8px;display:flex;align-items:center;justify-content:center}
.login-logo-mark i{font-size:18px;color:#fff}
.login-logo-name{font-size:17px;font-weight:700;color:var(--text1);letter-spacing:-0.4px}
.login-logo-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.login-title{font-size:20px;font-weight:700;color:var(--text1);letter-spacing:-0.5px;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:24px}
.login-err{background:var(--hot-bg);border:1px solid var(--hot-br);color:var(--hot);border-radius:var(--r);padding:9px 12px;font-size:13px;margin-bottom:14px}

/* ── PIPELINE BOARD ──────────────────── */
.pipeline{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}
.pipe-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh);display:flex;flex-direction:column;max-height:calc(100vh - 130px)}
.pipe-col-hd{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pipe-col-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em}
.pipe-col-count{font-size:12px;font-weight:600;font-family:var(--mono);padding:2px 8px;border-radius:20px}
.pipe-cards{padding:10px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1}
.pipe-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px 13px;cursor:pointer;transition:box-shadow 0.1s,transform 0.1s}
.pipe-card:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.pipe-card-name{font-size:14px;font-weight:600;color:var(--text1);margin-bottom:3px}
.pipe-card-phone{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:8px}
.pipe-card-foot{display:flex;align-items:center;justify-content:space-between}
.pipe-empty{text-align:center;padding:32px 16px;color:var(--text3);font-size:13px}
.pipe-empty i{font-size:22px;display:block;margin-bottom:6px;color:var(--border2)}

/* ── WELCOME CHIP ────────────────────── */
.welcome-chip{display:flex;align-items:center;gap:7px;padding:5px 12px 5px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:20px}
.welcome-avatar{width:24px;height:24px;background:var(--text1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.welcome-name{font-size:12px;font-weight:500;color:var(--text1)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script>

];
const DEMO_STATS  = {total:8,hot:3,warm:3,cold:2};
const DEMO_CONVOS = [
  {role:'user',     message:'Hi, I am looking for a 2BHK in Kharghar',score:null,created_at:new Date(Date.now()-3600000).toISOString()},

const gc  = s => s>=75?'var(--hot)':s>=45?'var(--warm)':'var(--cold)';
const fmt = ts => { if(!ts)return'—'; const d=new Date(ts); return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}); };
const ago = ts => { if(!ts)return'—'; const m=Math.floor((Date.now()-new Date(ts))/60000); if(m<1)return'just now'; if(m<60)return m+'m ago'; const hr=Math.floor(m/60); if(hr<24)return hr+'h ago'; return Math.floor(hr/24)+'d ago'; };

const ScoreBar = ({score}) => h('div',{className:'sc-row'},
  h('span',{className:'sc-n'},score),
  h('div',{className:'sc-bar'},h('div',{className:'sc-fill',style:{width:score+'%',background:gc(score)}}))
);
const Badge   = ({label}) => h('span',{className:`badge b-${label.toLowerCase()}`},label);
const Spinner = () => h('div',{className:'spinner'});
const Field   = ({label,hint,children}) => h('div',{className:'form-field'},
  h('label',{className:'form-label'},label),
  children,
  hint&&h('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'4px',fontFamily:'var(--mono)'}},hint)
);
const Toast = ({msg,type,onDone}) => {
  useEffect(()=>{const t=setTimeout(onDone,3200);return()=>clearTimeout(t)},[]);
  return h('div',{className:`toast ${type==='success'?'ok':'err'}`},
    h('i',{className:type==='success'?'ti ti-circle-check':'ti ti-circle-x'}),msg);
};

const Donut = ({stats}) => {
  const ref=useRef(null),chart=useRef(null);
  useEffect(()=>{
    if(!ref.current||!stats)return;
    chart.current?.destroy();
    chart.current=new Chart(ref.current,{
      type:'doughnut',
      data:{
        labels:['Hot','Warm','Cold'],
        datasets:[{data:[stats.hot,stats.warm,stats.cold],backgroundColor:['#EFA0A0','#F0CC80','#93B4F0'],borderWidth:0,hoverOffset:3}]
      },
      options:{responsive:true,maintainAspectRatio:false,cutout:'74%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.label}: ${c.raw}`}}}}
    });
    return()=>chart.current?.destroy();
  },[stats]);
  return h('canvas',{ref,role:'img','aria-label':'Lead distribution'});
};

  const visible=leads.filter(l=>{
    const fm=filter==='ALL'||l.label===filter;
    const sm=!search||(l.name||'').toLowerCase().includes(search.toLowerCase())||(l.phone||'').includes(search);
    return fm&&sm;
  });
  const counts={ALL:leads.length,HOT:leads.filter(l=>l.label==='HOT').length,WARM:leads.filter(l=>l.label==='WARM').length,COLD:leads.filter(l=>l.label==='COLD').length};

  const toCSV = v => {
    if(v===null||v===undefined) return '';
    const s = String(v).replace(/\r?\n/g,' ');
    return s.includes(',')||s.includes('"') ? `"${s.replace(/"/g,'""')}"` : s;
  };
  const fmtDate = ts => ts ? new Date(ts).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true}) : '';

  function downloadCSV(csvContent, filename){
    const bom = '﻿';
    const blob = new Blob([bom+csvContent],{type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=filename; a.click();
    URL.revokeObjectURL(url);
  }

  function exportLeadsOnly(){
    const headers = ['Name','Phone','Score','Status','Intent','Messages','Budget','Location','Timeline','Purpose','Site Visit','First Seen','Last Active'];
    const rows = leads.map(l=>[
      l.name||'Unknown', l.phone||'', l.score||0, l.label||'COLD',
      (l.intent||'general').replace('_',' '), l.message_count||0,
      l.budget_range||'', l.location_preference||'', l.timeline||'', l.purpose||'',
      l.site_visit_offered?'Yes':'No', fmtDate(l.created_at), fmtDate(l.last_message)
    ].map(toCSV).join(','));

/* ─── AUTH HELPER ─────────────────────────────────────────────── */
function getAuthToken(){ return localStorage.getItem('pa_token')||''; }
function apiFetch(url, opts={}){
  const token=getAuthToken();
  const headers={'Content-Type':'application/json',...(opts.headers||{})};
  if(token) headers['Authorization']=`Bearer ${token}`;
  // don't override Content-Type for FormData
  if(opts.body instanceof FormData) delete headers['Content-Type'];
  return fetch(url,{...opts,headers});
}

/* ─── LOGIN PAGE ──────────────────────────────────────────────── */
const LoginPage = ({onLogin}) => {
  const savedApi=localStorage.getItem('pa_api')||'';
  const [url,  setUrl]  =useState(savedApi);
  const [email,setEmail]=useState('');
  const [pass, setPass] =useState('');
  const [err,  setErr]  =useState('');
  const [busy, setBusy] =useState(false);
  async function login(){
    setErr('');
    if(!email.trim()||!pass){setErr('Enter email and password');return;}
    const base=(url||'').trim().replace(/\/$/,'');
    if(!base){setErr('Enter your backend URL first');return;}
    setBusy(true);
    try{
      const r=await fetch(`${base}/login`,{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email:email.trim(),password:pass})});
      const d=await r.json();
      if(r.ok&&d.token){
        localStorage.setItem('pa_api',base);
        localStorage.setItem('pa_token',d.token);
        onLogin(base,d.token);
      } else {
        setErr(d.error||'Invalid email or password');
      }
    }catch{setErr('Cannot reach server. Check the backend URL.');}
    setBusy(false);
  }
  function demo(){
    localStorage.removeItem('pa_api');
    localStorage.removeItem('pa_token');
    onLogin('DEMO','');
  }
  return h('div',{className:'login-wrap'},
    h('div',{className:'login-box'},
      h('div',{className:'login-logo'},
        h('div',{className:'login-logo-mark'},h('i',{className:'ti ti-robot'})),
        h('div',null,
          h('div',{className:'login-logo-name'},'Propello AI'),
          h('div',{className:'login-logo-sub'},'Lead Dashboard')
        )
      ),
      h('div',{className:'login-title'},'Welcome back'),
      h('div',{className:'login-sub'},'Sign in to access your dashboard'),
      err&&h('div',{className:'login-err'},err),
      h(Field,{label:'Backend URL'},
        h('input',{type:'url',value:url,onChange:e=>{setUrl(e.target.value);setErr('');},
          placeholder:'https://your-app.up.railway.app/api',onKeyDown:e=>e.key==='Enter'&&login()})
      ),
      h(Field,{label:'Email'},
        h('input',{type:'email',value:email,onChange:e=>{setEmail(e.target.value);setErr('');},
          placeholder:'admin@propello.ai',onKeyDown:e=>e.key==='Enter'&&login()})
      ),
      h(Field,{label:'Password'},
        h('input',{type:'password',value:pass,onChange:e=>{setPass(e.target.value);setErr('');},
          placeholder:'••••••••',onKeyDown:e=>e.key==='Enter'&&login()})
      ),
      h('button',{className:'btn btn-primary',style:{width:'100%',justifyContent:'center',padding:'10px',fontSize:'14px',marginTop:'4px'},onClick:login,disabled:busy},
        busy?h(Spinner):'Sign in'),
      h('div',{style:{textAlign:'center',marginTop:'14px'}},
        h('button',{className:'btn btn-ghost btn-sm',onClick:demo},'Try Demo (no login)')
      )
    )
  );
};

          h('div',{style:{fontSize:'10.5px',fontWeight:'600',color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:'8px'}},'How It Works'),
          h('div',{style:{fontSize:'12px',color:'var(--text2)',lineHeight:'1.8'}},
            '1. Create template on Meta Business Manager → Message Templates',h('br',null),
            '2. Set template name here (e.g. ',h('code',{style:{fontFamily:'var(--mono)',background:'var(--surface3)',padding:'1px 5px',borderRadius:'3px'}},'dreamhome_intro'),') → Save',h('br',null),
            '3. Your CRM triggers ',h('code',{style:{fontFamily:'var(--mono)',background:'var(--surface3)',padding:'1px 5px',borderRadius:'3px'}},'POST /api/send'),' as normal — no changes needed in CRM',h('br',null),
            '4. Bot auto-detects new numbers → sends template → user replies → AI takes over ✅'
          )
        )
      )
    ),
    h('div',{className:'card'},
      h('div',{className:'card-hd'},h('span',{className:'card-title'},'CRM Webhook Integration')),
      h('div',{className:'card-bd'},
        h(Field,{label:'CRM Webhook Secret (X-Webhook-Secret header)',hint:'Set the same value in your CRM for security. Leave blank to skip auth.'},
          h('input',{
            value:s.crm_webhook_secret||'',
            onChange:e=>set('crm_webhook_secret',e.target.value),
            placeholder:'e.g. mysecretkey123',
            type:'text'
          })
        ),
        h('div',{style:{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'12px 14px'}},
          h('div',{style:{fontSize:'10.5px',fontWeight:'600',color:'var(--text3)',fontFamily:'var(--mono)',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:'8px'}},'CRM API Endpoint'),
          h('div',{style:{fontFamily:'var(--mono)',fontSize:'12px',color:'var(--text2)',lineHeight:'2'}},
            h('div',null,h('strong',null,'URL: '),'POST ',h('code',{style:{background:'var(--surface3)',padding:'1px 5px',borderRadius:'3px'}},`${apiBase==='DEMO'?'https://your-app.railway.app/api':apiBase}/send`)),
            h('div',null,h('strong',null,'New number: '),'just send ',h('code',{style:{background:'var(--surface3)',padding:'1px 5px',borderRadius:'3px'}},'{phone, message}'),' — template auto-applied'),
            h('div',null,h('strong',null,'Existing contact: '),'same call — free-form delivered')
          )
        )
      )
    )
  );

  // ── KNOWLEDGE BASE TAB ────────────────────────────────────────
  const KnowledgeTab = () => {
    const [docs,       setDocs]      = useState(null);
    const [uploading,  setUploading] = useState(false);
    const [text,       setText]      = useState('');
    const [textName,   setTextName]  = useState('');
    const [dragOver,   setDragOver]  = useState(false);
    const [projName,   setProjName]  = useState('');
    const [projFiles,  setProjFiles] = useState([]);
    const [projUploading,setProjUploading] = useState(false);
    const fileRef    = useRef(null);
    const projRef    = useRef(null);

    const loadDocs = useCallback(async () => {
      if(isDemo){setDocs([]);return;}
      try{const r=await apiFetch(`${apiBase}/knowledge`);const d=await r.json();setDocs(d.data||[]);}
      catch{setDocs([]);}
    },[apiBase,isDemo]);

    useEffect(()=>{loadDocs();},[loadDocs]);

    async function uploadFile(file){
      if(!file)return;
      if(isDemo){showToast('Connect backend to upload files','err');return;}
      setUploading(true);
      try{
        const fd=new FormData();fd.append('file',file);
        const r=await apiFetch(`${apiBase}/knowledge/upload`,{method:'POST',body:fd});
        const d=await r.json();
        if(d.success){showToast(`"${file.name}" uploaded`,'success');loadDocs();}
        else showToast(d.error||'Upload failed','err');
      }catch{showToast('Cannot connect to backend','err');}
      setUploading(false);
    }

    async function uploadProject(){
      if(!projName.trim()){showToast('Enter a project name','err');return;}
      if(!projFiles.length){showToast('Select at least one file','err');return;}
      if(isDemo){showToast('Connect backend to upload','err');return;}
      setProjUploading(true);
      try{
        const fd=new FormData();
        fd.append('project_group', projName.trim());
        projFiles.forEach(f=>fd.append('files',f));
        const r=await apiFetch(`${apiBase}/knowledge/project`,{method:'POST',body:fd});
        const d=await r.json();
        if(d.success){
          showToast(`${d.uploaded} file(s) uploaded to "${projName}"`, 'success');
          if(d.errors&&d.errors.length) showToast(`${d.errors.length} file(s) skipped`,'err');
          setProjName('');setProjFiles([]);
          if(projRef.current) projRef.current.value='';
          loadDocs();
        } else showToast(d.error||'Upload failed','err');
      }catch{showToast('Cannot connect to backend','err');}
      setProjUploading(false);
    }

    async function uploadText(){
      if(!text.trim()||!textName.trim()){showToast('Add a title and content','err');return;}
      if(isDemo){showToast('Connect backend to save','err');return;}
      setUploading(true);
      try{
        const r=await apiFetch(`${apiBase}/knowledge/upload`,{method:'POST',body:JSON.stringify({name:textName,content:text})});
        const d=await r.json();
        if(d.success){showToast('Entry saved','success');setText('');setTextName('');loadDocs();}
        else showToast(d.error||'Failed','err');
      }catch{showToast('Cannot connect to backend','err');}
      setUploading(false);
    }

    async function deleteDOC(id,name){
      if(!confirm(`Delete "${name}"?`))return;
      try{
        await apiFetch(`${apiBase}/knowledge/${id}`,{method:'DELETE'});
        showToast('Deleted','success');loadDocs();
      }catch{showToast('Delete failed','err');}
    }

    const fmt_size=n=>n>1000?`${(n/1000).toFixed(1)}k chars`:`${n} chars`;

    // Group docs by project_group for display
    const grouped = {};
    const ungrouped = [];
    (docs||[]).forEach(d=>{
      if(d.project_group){
        if(!grouped[d.project_group]) grouped[d.project_group]=[];
        grouped[d.project_group].push(d);
      } else ungrouped.push(d);
    });

    return h('div',{style:{display:'flex',flexDirection:'column',gap:'14px'}},

      // ── Upload Project (multi-file) card ────────────────────────
      h('div',{className:'card'},
        h('div',{className:'card-hd'},
          h('span',{className:'card-title'},'Upload Project'),
          h('span',{style:{fontSize:'12px',color:'var(--text3)'}},'JSON + PDFs grouped under one project')
        ),
        h('div',{className:'card-bd',style:{display:'flex',flexDirection:'column',gap:'10px'}},
          h(Field,{label:'Project Name',hint:'E.g. "Krishna Aura", "Krishna Heights"'},
            h('input',{value:projName,onChange:e=>setProjName(e.target.value),
              placeholder:'Enter project name...'})),
          h(Field,{label:'Project Files',hint:'Select JSON data file + PDF brochures/floor plans together'},
            h('div',{style:{display:'flex',gap:'8px',alignItems:'center'}},
              h('button',{className:'btn btn-ghost',onClick:()=>projRef.current?.click()},
                h('i',{className:'ti ti-folder-open'}),'Select Files'),
              projFiles.length>0&&h('span',{style:{fontSize:'12px',color:'var(--text2)'}},
                `${projFiles.length} file(s) selected: ${projFiles.map(f=>f.name).join(', ')}`)
            ),
            h('input',{ref:projRef,type:'file',multiple:true,accept:'.json,.pdf,.txt',
              style:{display:'none'},
              onChange:e=>setProjFiles(Array.from(e.target.files))})
          ),
          h('button',{
            className:'btn btn-primary',
            onClick:uploadProject,
            disabled:projUploading||!projName.trim()||!projFiles.length
          }, projUploading?h(Spinner):[h('i',{className:'ti ti-folder-up'}),' Upload Project'])
        )
      ),

      // ── Upload single file card ─────────────────────────────────
      h('div',{className:'card'},
        h('div',{className:'card-hd'},
          h('span',{className:'card-title'},'Upload Single Document'),
          h('span',{style:{fontSize:'12px',color:'var(--text3)'}},
            'PDF, TXT — Max 15 MB')
        ),
        h('div',{className:'card-bd'},
          h('div',{
            style:{border:`2px dashed ${dragOver?'var(--accent)':'var(--border2)'}`,borderRadius:'var(--r2)',
              padding:'28px',textAlign:'center',cursor:'pointer',transition:'all 0.15s',
              background:dragOver?'var(--accent-sub)':'var(--surface2)'},
            onClick:()=>fileRef.current?.click(),
            onDragOver:e=>{e.preventDefault();setDragOver(true)},
            onDragLeave:()=>setDragOver(false),
            onDrop:e=>{e.preventDefault();setDragOver(false);uploadFile(e.dataTransfer.files[0]);}
          },
            h('i',{className:'ti ti-cloud-upload',style:{fontSize:'28px',color:'var(--text3)',display:'block',marginBottom:'8px'}}),
            h('div',{style:{fontSize:'14px',fontWeight:'500',color:'var(--text1)',marginBottom:'4px'}},'Drop file here or click to browse'),
            h('div',{style:{fontSize:'12px',color:'var(--text3)'}},uploading?'Uploading...':'Supports PDF, TXT files'),
            uploading&&h('div',{style:{marginTop:'10px',display:'flex',justifyContent:'center'}},h(Spinner))
          ),
          h('input',{ref:fileRef,type:'file',accept:'.pdf,.txt',style:{display:'none'},
            onChange:e=>uploadFile(e.target.files[0])})
        )
      ),

      // ── Manual text entry card ──────────────────────────────────
      h('div',{className:'card'},
        h('div',{className:'card-hd'},h('span',{className:'card-title'},'Add Text Entry')),
        h('div',{className:'card-bd'},
          h(Field,{label:'Title',hint:'E.g. "Pricing Sheet", "FAQ", "Location Details"'},
            h('input',{value:textName,onChange:e=>setTextName(e.target.value),placeholder:'Document title...'})),
          h(Field,{label:'Content'},
            h('textarea',{value:text,onChange:e=>setText(e.target.value),
              placeholder:'Paste pricing, property details, FAQs, or any information the bot should know...',
              style:{minHeight:'120px'}})),
          h('button',{className:'btn btn-primary',onClick:uploadText,disabled:uploading||!text.trim()||!textName.trim()},
            uploading?h(Spinner):h('i',{className:'ti ti-plus'}),' Save Entry')
        )
      ),

      // ── Uploaded docs list grouped by project ───────────────────
      h('div',{className:'card'},
        h('div',{className:'card-hd'},
          h('span',{className:'card-title'},'Knowledge Base'),
          h('button',{className:'btn btn-ghost btn-sm',onClick:loadDocs},h('i',{className:'ti ti-refresh'}),'Refresh')
        ),
        docs===null?h('div',{className:'empty'},h(Spinner)):
        docs.length===0
          ?h('div',{className:'empty'},
            h('i',{className:'ti ti-file-off'}),
            h('p',null,'No documents yet — upload a project or single file above'))
          :h('div',null,
            // Project groups
            Object.entries(grouped).map(([grp,items])=>
              h('div',{key:grp,style:{borderBottom:'1px solid var(--border)'}},
                h('div',{style:{padding:'8px 16px',background:'var(--surface2)',display:'flex',alignItems:'center',gap:'6px'}},
                  h('i',{className:'ti ti-folder',style:{color:'var(--warm)',fontSize:'13px'}}),
                  h('span',{style:{fontSize:'11px',fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.06em'}},grp),
                  h('span',{style:{fontSize:'11px',color:'var(--text3)',fontFamily:'var(--mono)'}},`${items.length} file(s)`)
                ),
                h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'13px'}},
                  h('tbody',null,items.map(d=>h('tr',{key:d.id,style:{borderBottom:'1px solid var(--border)'}},
                    h('td',{style:{padding:'8px 16px',paddingLeft:'32px'}},d.name),
                    h('td',{style:{padding:'8px 16px'}},h('span',{className:'badge b-tag'},d.file_type||'text')),
                    h('td',{style:{padding:'8px 16px',fontFamily:'var(--mono)',color:'var(--text3)',fontSize:'11px'}},fmt_size(d.size_chars||0)),
                    h('td',{style:{padding:'8px 16px',color:'var(--text3)',fontSize:'11px'}},fmt(d.created_at)),
                    h('td',{style:{padding:'8px 16px'}},h('button',{className:'btn btn-danger btn-sm',onClick:()=>deleteDOC(d.id,d.name)},
                      h('i',{className:'ti ti-trash'})))
                  )))
                )
              )
            ),
            // Ungrouped docs
            ungrouped.length>0&&h('div',null,
              Object.keys(grouped).length>0&&h('div',{style:{padding:'8px 16px',background:'var(--surface2)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:'6px'}},
                h('i',{className:'ti ti-file',style:{fontSize:'13px',color:'var(--text3)'}}),
                h('span',{style:{fontSize:'11px',fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.06em'}},'General')
              ),
              h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'13px'}},
                h('thead',null,h('tr',null,['Name','Type','Size','Uploaded',''].map(c=>h('th',{key:c,style:{padding:'8px 16px',textAlign:'left',borderBottom:'1px solid var(--border)',color:'var(--text3)',fontSize:'11px',fontWeight:600}},c)))),
                h('tbody',null,ungrouped.map(d=>h('tr',{key:d.id,style:{borderBottom:'1px solid var(--border)'}},
                  h('td',{style:{padding:'8px 16px'}},d.name),
                  h('td',{style:{padding:'8px 16px'}},h('span',{className:'badge b-tag'},d.file_type||'text')),
                  h('td',{style:{padding:'8px 16px',fontFamily:'var(--mono)',color:'var(--text3)',fontSize:'11px'}},fmt_size(d.size_chars||0)),
                  h('td',{style:{padding:'8px 16px',color:'var(--text3)',fontSize:'11px'}},fmt(d.created_at)),
                  h('td',{style:{padding:'8px 16px'}},h('button',{className:'btn btn-danger btn-sm',onClick:()=>deleteDOC(d.id,d.name)},
                    h('i',{className:'ti ti-trash'})))
                )))
              )
            )
          )
      ),
      isDemo&&h('div',{className:'notice'},h('i',{className:'ti ti-info-circle'}),
        'Connect your backend to upload real documents. The AI will use them to answer questions accurately.')
    );
  };

  return h('div',null,
    isDemo&&h('div',{className:'notice'},h('i',{className:'ti ti-info-circle'}),'Demo mode — changes are not saved. Connect your backend in Settings.'),
    tabBar,
    tab==='identity'&&identityTab,
    tab==='model'   &&modelTab,
    tab==='prompt'  &&promptTab,
    tab==='props'   &&propsTab,
    tab==='alerts'  &&alertsTab,
    tab==='crm'     &&crmTab,
    tab==='kb'      &&h(KnowledgeTab,null),
    saveBar
  );
};

/* ─── COSTS PAGE ─────────────────────────────────────────────── */
const CostsPage = ({apiBase,isDemo}) => {
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState('per-lead'); // 'per-lead' | 'summary'

  useEffect(()=>{
    if(isDemo){setData(null);setLoading(false);return;}
    apiFetch(`${apiBase}/costs`).then(r=>r.json()).then(d=>{setData(d.data||null);setLoading(false);}).catch(()=>setLoading(false));
  },[apiBase,isDemo]);

  const fmt_usd=v=>`$${(v||0).toFixed(4)}`;
  const fmt_inr=v=>`₹${(v||0).toFixed(3)}`;
  const fmt_tok=v=>v>=1000?`${(v/1000).toFixed(1)}k`:String(v||0);

  if(loading) return h('div',{className:'empty'},h(Spinner));
  if(isDemo) return h('div',{className:'empty'},h('i',{className:'ti ti-currency-dollar',style:{fontSize:'32px',color:'var(--text3)'}}),h('p',null,'Connect backend to view cost analytics'));
  if(!data)  return h('div',{className:'empty'},h('i',{className:'ti ti-alert-circle',style:{fontSize:'32px',color:'var(--text3)'}}),h('p',null,'No cost data yet — costs appear after conversations'));

  return h('div',null,
    // Summary cards
    h('div',{className:'stats-row',style:{gridTemplateColumns:'repeat(4,1fr)'}},
      h('div',{className:'stat'},
        h('div',{className:'stat-label'},'Total Spend'),
        h('div',{className:'stat-val',style:{fontSize:'22px'}},fmt_inr(data.total.inr)),
        h('div',{className:'stat-meta'},fmt_usd(data.total.usd))
      ),
      h('div',{className:'stat'},
        h('div',{className:'stat-label'},'Avg / Conversation'),
        h('div',{className:'stat-val',style:{fontSize:'22px'}},fmt_inr(data.avgPerConversation.inr)),
        h('div',{className:'stat-meta'},fmt_usd(data.avgPerConversation.usd))
      ),
      h('div',{className:'stat'},
        h('div',{className:'stat-label'},'Total Leads Tracked'),
        h('div',{className:'stat-val'},data.totalConversations),
        h('div',{className:'stat-meta'},'with token data')
      ),
      h('div',{className:'stat'},
        h('div',{className:'stat-label'},'Model Pricing'),
        h('div',{className:'stat-val',style:{fontSize:'16px',letterSpacing:0}},'Gemini 2.5'),
        h('div',{className:'stat-meta'},'$0.15/1M in · $0.60/1M out')
      )
    ),

    // View toggle + table
    h('div',{className:'card'},
      h('div',{className:'card-hd'},
        h('span',{className:'card-title'},'Cost Breakdown'),
        h('div',{style:{display:'flex',gap:'6px'}},
          h('button',{className:`btn btn-sm ${view==='per-lead'?'btn-primary':'btn-ghost'}`,onClick:()=>setView('per-lead')},'Per Lead'),
          h('button',{className:`btn btn-sm ${view==='summary'?'btn-primary':'btn-ghost'}`,onClick:()=>setView('summary')},'Summary')
        )
      ),
      h('div',{style:{overflowX:'auto'}},
        view==='per-lead'
          ? h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'13px'}},
              h('thead',null,h('tr',null,
                ['Phone','Input Tokens','Output Tokens','Messages','Cost (₹)','Cost ($)'].map(col=>
                  h('th',{key:col,style:{padding:'10px 16px',textAlign:'left',borderBottom:'1px solid var(--border)',color:'var(--text3)',fontSize:'11px',fontFamily:'var(--mono)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}},col)
                )
              )),
              h('tbody',null,
                (data.perLead||[]).map((l,i)=>
                  h('tr',{key:l.phone,style:{background:i%2===0?'transparent':'var(--surface2)'}},
                    h('td',{style:{padding:'10px 16px',fontFamily:'var(--mono)',fontSize:'12px'}},l.phone),
                    h('td',{style:{padding:'10px 16px',fontFamily:'var(--mono)',color:'var(--text2)'}},fmt_tok(l.input_tokens)),
                    h('td',{style:{padding:'10px 16px',fontFamily:'var(--mono)',color:'var(--text2)'}},fmt_tok(l.output_tokens)),
                    h('td',{style:{padding:'10px 16px',fontFamily:'var(--mono)',color:'var(--text2)'}},l.messages),
                    h('td',{style:{padding:'10px 16px',fontWeight:600,color:'var(--green)'}},fmt_inr(l.cost.inr)),
                    h('td',{style:{padding:'10px 16px',fontFamily:'var(--mono)',color:'var(--text3)',fontSize:'11px'}},fmt_usd(l.cost.usd))
                  )
                )
              )
            )
          : h('div',{style:{padding:'24px 16px'}},
              h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}},
                h('div',{style:{padding:'16px',background:'var(--surface2)',borderRadius:'var(--r)',border:'1px solid var(--border)'}},
                  h('div',{style:{fontSize:'11px',color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:'8px'}},'TOTAL INPUT TOKENS'),
                  h('div',{style:{fontSize:'24px',fontWeight:700,fontFamily:'var(--mono)'}},fmt_tok((data.perLead||[]).reduce((s,l)=>s+l.input_tokens,0))),
                  h('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'4px'}},'$0.10 per 1M tokens')
                ),
                h('div',{style:{padding:'16px',background:'var(--surface2)',borderRadius:'var(--r)',border:'1px solid var(--border)'}},
                  h('div',{style:{fontSize:'11px',color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:'8px'}},'TOTAL OUTPUT TOKENS'),
                  h('div',{style:{fontSize:'24px',fontWeight:700,fontFamily:'var(--mono)'}},fmt_tok((data.perLead||[]).reduce((s,l)=>s+l.output_tokens,0))),
                  h('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'4px'}},'$0.40 per 1M tokens')
                ),
                h('div',{style:{padding:'16px',background:'var(--green-bg)',borderRadius:'var(--r)',border:'1px solid #BBF7D0',gridColumn:'1/-1'}},
                  h('div',{style:{fontSize:'11px',color:'var(--green)',fontFamily:'var(--mono)',marginBottom:'4px'}},'TOTAL COST BREAKDOWN'),
                  h('div',{style:{fontSize:'20px',fontWeight:700,color:'var(--green)'}},`${fmt_inr(data.total.inr)}  ·  ${fmt_usd(data.total.usd)}`),
                  h('div',{style:{fontSize:'12px',color:'var(--green)',marginTop:'4px'}},`Across ${data.totalConversations} conversations · Avg ${fmt_inr(data.avgPerConversation.inr)} per conversation`)
                )
              )
            )
      )
    )
  );
};

/* ─── CAMPAIGN INTELLIGENCE PAGE ─────────────────────────────── */
const CampaignIntelPage = ({apiBase,isDemo,showToast}) => {
  const [tab,setTab] = useState('overview');
  const [overview,setOverview] = useState(null);
  const [funnel,setFunnel] = useState([]);
  const [issues,setIssues] = useState([]);
  const [hallu,setHallu] = useState([]);
  const [obj,setObj] = useState({breakdown:[],samples:[]});
  const [queue,setQueue] = useState([]);
  const [patterns,setPatterns] = useState({bot:[],user:[]});
  const [behavior,setBehavior] = useState({intents:[],signals:[],concerns:[],missed:null});
  const [showReviewed,setShowReviewed] = useState(false);
  const [loading,setLoading] = useState(true);

  const refresh = useCallback(async () => {
    if (isDemo) { setLoading(false); return; }
    setLoading(true);
    try {
      const [ovR,fnR,isR,haR,obR,qR,paR,beR] = await Promise.all([
        apiFetch(`${apiBase}/analytics/overview`),
        apiFetch(`${apiBase}/analytics/funnel`),
        apiFetch(`${apiBase}/analytics/issues`),
        apiFetch(`${apiBase}/analytics/hallucinations`),
        apiFetch(`${apiBase}/analytics/objections`),
        apiFetch(`${apiBase}/analytics/queue?reviewed=${showReviewed?'1':'0'}`),
        apiFetch(`${apiBase}/analytics/patterns`),
        apiFetch(`${apiBase}/analytics/customer-behavior`)
      ]);
      const [ov,fn,is,ha,ob,q,pa,be] = await Promise.all([ovR.json(),fnR.json(),isR.json(),haR.json(),obR.json(),qR.json(),paR.json(),beR.json()]);
      setOverview(ov.last7 || null);
      setFunnel(fn.funnel || []);
      setIssues(is.issues || []);
      setHallu(ha.items || []);
      setObj({breakdown:ob.breakdown||[],samples:ob.samples||[]});
      setQueue(q.items || []);
      setPatterns({bot:pa.bot||[],user:pa.user||[]});
      setBehavior({intents:be.intents||[],signals:be.signals||[],concerns:be.concerns||[],missed:be.missed||null});
    } catch(e) { console.warn('analytics fetch failed:', e.message); }
    setLoading(false);
  },[apiBase,isDemo,showReviewed]);

  useEffect(()=>{refresh();},[refresh]);

  async function submitVerdict(id, verdict) {
    try {
      const r = await apiFetch(`${apiBase}/analytics/queue/${id}/verdict`, {
        method: 'POST',
        body: JSON.stringify({ verdict })
      });
      const d = await r.json();
      if (d.success) {
        showToast && showToast('Verdict recorded','success');
        setQueue(q => q.filter(x => x.id !== id));
      } else {
        showToast && showToast(d.error || 'Failed','err');
      }
    } catch(e) { showToast && showToast(e.message,'err'); }
  }

  if (isDemo) return h('div',{className:'empty'},
    h('i',{className:'ti ti-chart-pie',style:{fontSize:'32px',color:'var(--text3)'}}),
    h('p',null,'Connect backend to view Campaign Intelligence')
  );
  if (loading && !overview) return h('div',{className:'empty'},h(Spinner));

  const TABS = [
    {k:'overview',    l:'Overview',         icon:'ti-layout-dashboard'},
    {k:'funnel',      l:'Sales Funnel',     icon:'ti-filter'},
    {k:'issues',      l:'Issues',           icon:'ti-alert-triangle'},
    {k:'patterns',    l:'Recurring Patterns', icon:'ti-repeat'},
    {k:'behavior',    l:'Customer Behavior', icon:'ti-user-search'},
    {k:'hallu',       l:'Hallucinations',   icon:'ti-bug'},
    {k:'objections',  l:'Objections',       icon:'ti-message-2'},
    {k:'queue',       l:'Review Queue',     icon:'ti-checks'}
  ];

  const tabBar = h('div',{className:'stab-bar'},
    TABS.map(t => h('button',{key:t.k,className:`stab ${tab===t.k?'active':''}`,onClick:()=>setTab(t.k)},
      h('i',{className:'ti '+t.icon}),t.l))
  );

  // ── Overview panel ──
  const overviewPanel = h('div',null,
    !overview || overview.total_exchanges === 0
      ? h('div',{className:'empty'},
          h('i',{className:'ti ti-database-off',style:{fontSize:'32px',color:'var(--text3)'}}),
          h('p',null,'No analysis data yet'),
          h('p',{style:{fontSize:'12px',color:'var(--text3)'}},'Data appears after bot conversations. If you see this after live traffic, run backend/sql/conversation_analysis.sql in Supabase.')
        )
      : h('div',null,
          h('div',{className:'stats-row',style:{gridTemplateColumns:'repeat(4,1fr)',gap:'12px'}},
            metricCard('Total Exchanges', overview.total_exchanges, 'last 7 days'),
            metricCard('Avg Quality', overview.avg_quality != null ? overview.avg_quality + '/10' : '—', 'evaluated only'),
            metricCard('Hallucinations', overview.hallucinations, 'act immediately', overview.hallucinations > 0 ? 'red' : null),
            metricCard('Handle Rate', overview.handle_rate_pct != null ? overview.handle_rate_pct + '%' : '—', 'bot moved convo forward', overview.handle_rate_pct != null && overview.handle_rate_pct < 70 ? 'amber' : null),
          ),
          h('div',{className:'stats-row',style:{gridTemplateColumns:'repeat(4,1fr)',gap:'12px',marginTop:'12px'}},
            metricCard('Hostile Customers', overview.hostile_count, 'review same day', overview.hostile_count > 0 ? 'amber' : null),
            metricCard('At Closing', overview.at_closing_count, 'ready to commit'),
            metricCard('Dead Conversations', overview.dead_count, 'no path forward', overview.dead_count > 20 ? 'amber' : null),
            metricCard('No CTA Flags', overview.no_cta_count, 'bot went passive', overview.no_cta_count > overview.total_exchanges * 0.1 ? 'amber' : null),
          )
        )
  );

  // ── Funnel panel ──
  const funnelPanel = funnel.length === 0
    ? h('div',{className:'empty'},h('p',null,'Funnel data builds up after LLM evaluation completes (every 5 min)'))
    : h('div',{className:'card'},
        h('div',{className:'card-hd'},h('span',{className:'card-title'},'Sales Funnel — Unique Customers (7d)')),
        h('div',{className:'card-bd'},
          (() => {
            const max = Math.max(...funnel.map(s => +s.unique_customers || 0), 1);
            return funnel.map(s => h('div',{key:s.sales_stage,style:{marginBottom:'10px'}},
              h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'12px',marginBottom:'4px'}},
                h('span',{style:{textTransform:'capitalize',fontWeight:600}}, s.sales_stage),
                h('span',{style:{color:'var(--text3)',fontFamily:'var(--mono)'}}, `${s.unique_customers} • avg ${s.avg_quality ? (+s.avg_quality).toFixed(1) : '—'}/10`)
              ),
              h('div',{style:{height:'10px',background:'var(--surface2)',borderRadius:'6px',overflow:'hidden'}},
                h('div',{style:{height:'100%',width:`${(+s.unique_customers / max) * 100}%`,background:'var(--brand)',transition:'width .3s'}})
              )
            ));
          })()
        )
      );

  // ── Issues panel ──
  const issuesPanel = issues.length === 0
    ? h('div',{className:'empty'},h('p',null,'No issues flagged yet — either no traffic or things are looking clean'))
    : h('div',{className:'card'},
        h('div',{className:'card-hd'},h('span',{className:'card-title'},'Issue Frequency — Last 7 Days')),
        h('div',{className:'card-bd'},
          h('div',{style:{fontSize:'11px',color:'var(--text3)',marginBottom:'12px',fontFamily:'var(--mono)'}},
            'red ≥ 10% — fix this week  ·  amber 5-10% — monitor  ·  green < 5% — noise'),
          issues.map(i => h('div',{key:i.issue,style:{marginBottom:'10px'}},
            h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'12px',marginBottom:'4px'}},
              h('span',{style:{fontWeight:600,fontFamily:'var(--mono)'}}, i.issue),
              h('span',{style:{color: i.severity === 'red' ? 'var(--hot)' : i.severity === 'amber' ? '#D97706' : 'var(--text3)', fontFamily:'var(--mono)'}},
                `${i.occurrences} (${i.pct_of_exchanges || 0}%)`)
            ),
            h('div',{style:{height:'8px',background:'var(--surface2)',borderRadius:'4px',overflow:'hidden'}},
              h('div',{style:{height:'100%',width:`${Math.min(+i.pct_of_exchanges||0,100)}%`,background:i.severity==='red'?'var(--hot)':i.severity==='amber'?'#F59E0B':'var(--text3)'}})
            )
          ))
        )
      );

  // ── Hallucinations panel ──
  const halluPanel = hallu.length === 0
    ? h('div',{className:'empty'},
        h('i',{className:'ti ti-check',style:{fontSize:'32px',color:'var(--green)'}}),
        h('p',null,'No hallucinations detected'))
    : h('div',null,
        h('div',{style:{fontSize:'12px',color:'var(--text3)',marginBottom:'10px',fontFamily:'var(--mono)'}},
          `${hallu.length} flagged claim(s) — each shows what bot said + ground-truth comparison`),
        hallu.map(item => h('div',{key:item.id,className:'card',style:{marginBottom:'10px'}},
          h('div',{className:'card-bd'},
            h('div',{style:{fontSize:'11px',color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:'6px'}},
              new Date(item.created_at).toLocaleString(),' · ',item.phone),
            item.user_message && h('div',{style:{fontSize:'12px',padding:'8px 10px',background:'var(--surface2)',borderRadius:'6px',marginBottom:'6px'}},
              h('span',{style:{color:'var(--text3)',fontWeight:600,marginRight:'6px'}},'User:'),item.user_message),
            h('div',{style:{fontSize:'12px',padding:'8px 10px',background:'var(--surface2)',borderRadius:'6px',marginBottom:'6px',borderLeft:'3px solid var(--hot)'}},
              h('span',{style:{color:'var(--hot)',fontWeight:600,marginRight:'6px'}},'Bot:'),item.bot_message),
            item.hallucination_detail && item.hallucination_detail.items &&
              h('div',{style:{fontSize:'12px',padding:'8px 10px',background:'#FEF3C7',borderRadius:'6px',color:'#92400E'}},
                h('strong',null,'Flagged claims: '),
                (item.hallucination_detail.items || []).map((it,i) =>
                  h('span',{key:i,style:{marginRight:'8px'}},`${it.kind}: "${it.claim}"`)
                )
              )
          )
        ))
      );

  // ── Objections panel ──
  const objPanel = obj.breakdown.length === 0
    ? h('div',{className:'empty'},h('p',null,'No objection data yet — appears after LLM evaluations'))
    : h('div',null,
        h('div',{className:'card'},
          h('div',{className:'card-hd'},h('span',{className:'card-title'},'Objection Breakdown — Last 7 Days')),
          h('div',{className:'card-bd'},
            h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'13px'}},
              h('thead',null,h('tr',null,
                ['Type','Count','Handle Rate','Avg Quality'].map(c =>
                  h('th',{key:c,style:{padding:'8px 12px',textAlign:'left',borderBottom:'1px solid var(--border)',color:'var(--text3)',fontSize:'11px',fontFamily:'var(--mono)',fontWeight:600,textTransform:'uppercase'}},c))
              )),
              h('tbody',null,
                obj.breakdown.map(b => h('tr',{key:b.objection_type},
                  h('td',{style:{padding:'10px 12px',textTransform:'capitalize',fontWeight:600}},b.objection_type),
                  h('td',{style:{padding:'10px 12px',fontFamily:'var(--mono)'}},b.occurrences),
                  h('td',{style:{padding:'10px 12px',fontFamily:'var(--mono)',color: +b.handle_rate_pct < 50 ? 'var(--hot)' : +b.handle_rate_pct < 70 ? '#D97706' : 'var(--green)'}},`${b.handle_rate_pct || 0}%`),
                  h('td',{style:{padding:'10px 12px',fontFamily:'var(--mono)',color:'var(--text2)'}},b.avg_quality ? (+b.avg_quality).toFixed(1) : '—')
                ))
              )
            )
          )
        ),
        obj.samples.length > 0 && h('div',{className:'card',style:{marginTop:'12px'}},
          h('div',{className:'card-hd'},h('span',{className:'card-title'},'Recent Objection Exchanges (sample)')),
          h('div',{className:'card-bd'},
            obj.samples.slice(0,10).map(s => h('div',{key:s.id,style:{padding:'10px',background:'var(--surface2)',borderRadius:'6px',marginBottom:'8px',fontSize:'12px'}},
              h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'10px',color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:'6px'}},
                h('span',null,s.objection_type,' · ',new Date(s.created_at).toLocaleString()),
                h('span',{style:{color: s.handled ? 'var(--green)' : 'var(--hot)'}}, s.handled ? '✓ handled' : '✗ failed')
              ),
              h('div',{style:{marginBottom:'4px'}},h('strong',null,'User: '),s.user_message),
              h('div',null,h('strong',null,'Bot: '),s.bot_message)
            ))
          )
        )
      );

  // ── Review queue panel ──
  // ── Recurring Patterns panel ──
  const patternsTable = (rows, kind) => rows.length === 0
    ? h('div',{className:'empty',style:{padding:'24px'}},h('p',null, `No ${kind} patterns yet — need more conversations`))
    : h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'13px'}},
        h('thead',null,h('tr',null,
          ['Phrase (first ~6 words)','Count','% of total', kind==='bot'?'no_cta':'Handle Rate', kind==='bot'?'too_long':'Avg Quality'].map(c =>
            h('th',{key:c,style:{padding:'8px 12px',textAlign:'left',borderBottom:'1px solid var(--border)',color:'var(--text3)',fontSize:'11px',fontFamily:'var(--mono)',fontWeight:600,textTransform:'uppercase'}},c))
        )),
        h('tbody',null,
          rows.map(r => h('tr',{key:r.bot_phrase||r.user_phrase,style:{borderBottom:'1px solid var(--border)'}},
            h('td',{style:{padding:'10px 12px',fontFamily:'var(--mono)',maxWidth:'420px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},
              kind==='bot' ? r.bot_phrase : r.user_phrase),
            h('td',{style:{padding:'10px 12px',fontFamily:'var(--mono)',fontWeight:600}}, r.occurrences),
            h('td',{style:{padding:'10px 12px',fontFamily:'var(--mono)',color:'var(--text3)'}}, `${r.pct_of_exchanges || 0}%`),
            kind === 'bot'
              ? h('td',{style:{padding:'10px 12px',fontFamily:'var(--mono)',color: r.no_cta_count > 0 ? 'var(--hot)' : 'var(--text3)'}}, r.no_cta_count || 0)
              : h('td',{style:{padding:'10px 12px',fontFamily:'var(--mono)',color: +r.handle_rate_pct < 50 ? 'var(--hot)' : +r.handle_rate_pct < 70 ? '#D97706' : 'var(--green)'}}, r.handle_rate_pct != null ? `${r.handle_rate_pct}%` : '—'),
            kind === 'bot'
              ? h('td',{style:{padding:'10px 12px',fontFamily:'var(--mono)',color:'var(--text3)'}}, r.too_long_count || 0)
              : h('td',{style:{padding:'10px 12px',fontFamily:'var(--mono)',color:'var(--text2)'}}, r.avg_quality ? (+r.avg_quality).toFixed(1) : '—')
          ))
        )
      );

  const patternsPanel = h('div',null,
    h('div',{style:{fontSize:'12px',color:'var(--text3)',marginBottom:'12px',fontFamily:'var(--mono)'}},
      'Phrases the bot OR the customer say repeatedly. Bot phrases with high no_cta = passive reply pattern. User phrases with low handle rate = prompt gap.'),
    h('div',{className:'card',style:{marginBottom:'16px'}},
      h('div',{className:'card-hd'},h('span',{className:'card-title'},'Bot phrases that keep appearing')),
      h('div',{style:{overflowX:'auto'}}, patternsTable(patterns.bot, 'bot'))
    ),
    h('div',{className:'card'},
      h('div',{className:'card-hd'},h('span',{className:'card-title'},'Customer phrases that keep appearing')),
      h('div',{style:{overflowX:'auto'}}, patternsTable(patterns.user, 'user'))
    )
  );

  // ── Customer Behavior panel ──
  const behaviorList = (rows, title, emptyMsg) => h('div',{className:'card',style:{marginBottom:'12px'}},
    h('div',{className:'card-hd'},h('span',{className:'card-title'}, title)),
    h('div',{className:'card-bd'},
      rows.length === 0
        ? h('div',{style:{padding:'12px',color:'var(--text3)',fontSize:'12px'}}, emptyMsg)
        : rows.map(r => h('div',{key:r.label,style:{marginBottom:'8px'}},
            h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'12px',marginBottom:'4px'}},
              h('span',{style:{fontWeight:600}}, r.label.replace(/_/g,' ')),
              h('span',{style:{color:'var(--text3)',fontFamily:'var(--mono)'}}, `${r.occurrences} (${r.pct_of_exchanges || 0}%)`)
            ),
            h('div',{style:{height:'6px',background:'var(--surface2)',borderRadius:'3px',overflow:'hidden'}},
              h('div',{style:{height:'100%',width:`${Math.min(+r.pct_of_exchanges||0,100)}%`,background:'var(--brand)'}})
            )
          ))
    )
  );

  const behaviorPanel = h('div',null,
    behavior.missed && behavior.missed.evaluated_count > 0 && h('div',{className:'card',style:{marginBottom:'16px',background: +behavior.missed.missed_rate_pct >= 15 ? '#FEF3C7' : 'var(--surface)'}},
      h('div',{className:'card-bd',style:{display:'flex',alignItems:'center',gap:'16px'}},
        h('div',{style:{fontSize:'28px',fontWeight:700,color: +behavior.missed.missed_rate_pct >= 15 ? '#92400E' : 'var(--text)'}}, `${behavior.missed.missed_rate_pct || 0}%`),
        h('div',null,
          h('div',{style:{fontWeight:600}},'Missed Signal Rate'),
          h('div',{style:{fontSize:'12px',color:'var(--text3)'}}, `${behavior.missed.missed_count} of ${behavior.missed.evaluated_count} exchanges had a buying signal the bot ignored`)
        )
      )
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'12px'}},
      behaviorList(behavior.intents,  'Customer Intent (last 7d)', 'No intent data yet'),
      behaviorList(behavior.signals,  'Buying Signals Customers Drop', 'No signal data yet'),
      behaviorList(behavior.concerns, 'Top Customer Concerns', 'No concern data yet')
    )
  );

  const queuePanel = h('div',null,
    h('div',{style:{display:'flex',gap:'8px',marginBottom:'12px',alignItems:'center'}},
      h('button',{className:`btn btn-sm ${!showReviewed?'btn-primary':'btn-ghost'}`,onClick:()=>setShowReviewed(false)},'Needs Review'),
      h('button',{className:`btn btn-sm ${showReviewed?'btn-primary':'btn-ghost'}`,onClick:()=>setShowReviewed(true)},'Already Reviewed'),
      h('button',{className:'btn btn-sm btn-ghost',onClick:refresh,style:{marginLeft:'auto'}},h('i',{className:'ti ti-refresh'}),'Refresh')
    ),
    queue.length === 0
      ? h('div',{className:'empty'},h('p',null, showReviewed ? 'Nothing reviewed yet' : 'Queue is empty — nothing to review 🎉'))
      : queue.map(item => h('div',{key:item.id,className:'card',style:{marginBottom:'10px'}},
          h('div',{className:'card-bd'},
            h('div',{style:{fontSize:'10px',color:'var(--text3)',fontFamily:'var(--mono)',marginBottom:'6px',display:'flex',justifyContent:'space-between'}},
              h('span',null, new Date(item.created_at).toLocaleString(),' · ',item.phone),
              h('span',null,
                (item.rule_flags||[]).map(f => h('span',{key:f,style:{marginRight:'6px',padding:'2px 6px',background:'#FEE2E2',color:'#991B1B',borderRadius:'4px'}}, f)),
                item.response_quality_score != null && h('span',{style:{padding:'2px 6px',background:'var(--surface2)',borderRadius:'4px'}},`Q ${item.response_quality_score}/10`),
                item.sentiment === 'hostile' && h('span',{style:{padding:'2px 6px',background:'#FEE2E2',color:'#991B1B',borderRadius:'4px',marginLeft:'6px'}},'hostile')
              )
            ),
            item.user_message && h('div',{style:{fontSize:'12px',padding:'8px 10px',background:'var(--surface2)',borderRadius:'6px',marginBottom:'6px'}},
              h('strong',null,'User: '), item.user_message),
            h('div',{style:{fontSize:'12px',padding:'8px 10px',background:'var(--surface2)',borderRadius:'6px',marginBottom:'6px',borderLeft:'3px solid var(--brand)'}},
              h('strong',null,'Bot: '), item.bot_message),
            item.improvement_suggestion && h('div',{style:{fontSize:'12px',padding:'8px 10px',background:'#FEF3C7',color:'#92400E',borderRadius:'6px',marginBottom:'6px'}},
              h('strong',null,'Suggestion: '), item.improvement_suggestion),
            !item.human_reviewed
              ? h('div',{style:{display:'flex',gap:'6px',marginTop:'8px'}},
                  h('button',{className:'btn btn-sm',style:{background:'#FEE2E2',color:'#991B1B'},onClick:()=>submitVerdict(item.id,'confirmed_bad')},'Confirmed Bad'),
                  h('button',{className:'btn btn-sm btn-ghost',onClick:()=>submitVerdict(item.id,'false_alarm')},'False Alarm'),
                  (item.rule_flags||[]).includes('hallucination') &&
                    h('button',{className:'btn btn-sm',style:{background:'#FED7AA',color:'#9A3412'},onClick:()=>submitVerdict(item.id,'hallucination_confirmed')},'Hallucination Confirmed')
                )
              : h('div',{style:{fontSize:'11px',color:'var(--text3)',fontFamily:'var(--mono)',marginTop:'6px'}},
                  'verdict: ', h('strong',null, item.human_verdict || '—'))
          )
        ))
  );

  return h('div',null,
    tabBar,
    h('div',{style:{marginTop:'14px'}},
      tab === 'overview'   ? overviewPanel :
      tab === 'funnel'     ? funnelPanel   :
      tab === 'issues'     ? issuesPanel   :
      tab === 'patterns'   ? patternsPanel :
      tab === 'behavior'   ? behaviorPanel :
      tab === 'hallu'      ? halluPanel    :
      tab === 'objections' ? objPanel      :
      tab === 'queue'      ? queuePanel    : null
    )
  );
};

function metricCard(label, value, sub, tone) {
  const color = tone === 'red' ? 'var(--hot)' : tone === 'amber' ? '#D97706' : null;
  return h('div',{className:'stat'},
    h('div',{className:'stat-label'},label),
    h('div',{className:'stat-val',style:color?{color,fontSize:'22px'}:{fontSize:'22px'}}, value),
    sub && h('div',{className:'stat-meta'}, sub)
  );
}

/* ─── APP ROOT ────────────────────────────────────────────────── */
function App(){
  const savedApi=localStorage.getItem('pa_api');
  const savedToken=localStorage.getItem('pa_token');
  const [loggedIn, setLoggedIn]=useState(!!(savedToken&&savedApi)||savedApi==='DEMO'||(!savedApi&&!savedToken&&false));
  const [page,     setPage]  =useState('overview');
  const [apiBase,  setApiBase]=useState(savedApi||'DEMO');
  function handleLogin(base,token){
    setApiBase(base);
    setLoggedIn(true);
  }
  function handleLogout(){
    localStorage.removeItem('pa_auth');
    localStorage.removeItem('pa_token');
    setLoggedIn(false);
    setApiBase('DEMO');
  }
  const [leads,    setLeads] =useState(DEMO_LEADS);
  const [stats,    setStats] =useState(DEMO_STATS);
  const [loading,  setLoading]=useState(false);
  const [selected, setSelected]=useState(null);
  const [showBcast,setBcast]  =useState(false);
  const [showTmpl, setTmpl]   =useState(false);
  const [showConn, setConn]   =useState(false);
  const [toast,    setToast]  =useState(null);
  const isDemo=apiBase==='DEMO';
  const showToast=(msg,type='success')=>setToast({msg,type,id:Date.now()});

  const fetchData=useCallback(async()=>{
    if(isDemo){setLeads(DEMO_LEADS);setStats(DEMO_STATS);return;}
    setLoading(true);
    try{
      const [sr,lr]=await Promise.all([apiFetch(`${apiBase}/stats`),apiFetch(`${apiBase}/leads`)]);
      if(sr.ok&&lr.ok){const[sd,ld]=await Promise.all([sr.json(),lr.json()]);setStats(sd.data);setLeads(ld.data||[]);}
    }catch(e){console.warn('Fetch failed:',e.message);}
    setLoading(false);
  },[apiBase,isDemo]);

  useEffect(()=>{fetchData();const t=setInterval(fetchData,30000);return()=>clearInterval(t);},[fetchData]);

  const hotCount=leads.filter(l=>l.label==='HOT').length;
  const NAV=[
    {key:'overview',      icon:'ti-layout-dashboard',label:'Overview'},
    {key:'pipeline',      icon:'ti-layout-kanban',   label:'Pipeline'},
    {key:'leads',         icon:'ti-users',            label:'All Leads',badge:hotCount||null},
    {key:'agent-settings',icon:'ti-robot',            label:'Agent Settings'},
    {key:'costs',         icon:'ti-currency-rupee',   label:'Cost Analytics'},
    {key:'campaign-intel',icon:'ti-chart-pie',        label:'Campaign Intel'},
  ];
  const META={
    overview:        {title:'Overview',       sub:'Real-time lead pipeline'},
    pipeline:        {title:'Pipeline',       sub:'Leads by stage'},
    leads:           {title:'All Leads',      sub:`${leads.length} total`},
    'agent-settings':{title:'Agent Settings', sub:'Configure your AI bot'},
    costs:           {title:'Cost Analytics', sub:'Token usage & spend per conversation'},
    'campaign-intel':{title:'Campaign Intelligence', sub:'Bot performance, issues, and review queue'},
  };

  if(!loggedIn) return h(LoginPage,{onLogin:handleLogin});

  return h('div',{className:'app'},
    h('aside',{className:'sidebar'},
      h('div',{className:'sb-top'},
        h('div',{className:'brand'},
          h('div',{className:'brand-mark'},h('i',{className:'ti ti-robot'})),
          h('div',{className:'brand-text'},
            h('div',{className:'brand-name'},'Propello AI'),
            h('div',{className:'brand-tag'},'Lead Dashboard')
          )
        )
      ),
      h('nav',{className:'sb-nav'},
        h('div',{className:'nav-grp'},'Main'),
        NAV.map(n=>h('button',{key:n.key,className:`nav-btn ${page===n.key?'active':''}`,onClick:()=>setPage(n.key)},
          h('i',{className:'ti '+n.icon}),n.label,
          n.badge&&h('span',{className:'nav-badge'},n.badge)
        )),
        h('div',{className:'nav-grp'},'Actions'),
        h('button',{className:'nav-btn',onClick:()=>setBcast(true)},h('i',{className:'ti ti-speakerphone'}),'Broadcast'),
        h('button',{className:'nav-btn',onClick:()=>setTmpl(true)},h('i',{className:'ti ti-send'}),'Template Campaign'),
        h('button',{className:'nav-btn',onClick:fetchData},h('i',{className:`ti ti-refresh${loading?' spin':''}`}),'Refresh'),
        h('button',{className:'nav-btn',onClick:()=>setConn(true)},h('i',{className:'ti ti-plug'}),'Connect Backend')
      ),
      h('div',{className:'sb-foot'},
        h('div',{className:'conn-pill'},
          h('div',{className:`dot ${isDemo?'demo':'on'}`}),
          h('span',{className:'conn-label'},isDemo?'Demo mode':'Live')
        ),
        h('button',{className:'nav-btn',style:{marginTop:'6px',color:'var(--hot)'},onClick:handleLogout},
          h('i',{className:'ti ti-logout'}),'Sign out')
      )
    ),
    h('main',{className:'main'},
      h('div',{className:'topbar'},
        h('div',null,
          h('div',{className:'pg-title'},META[page]?.title),
          h('div',{className:'pg-sub'},META[page]?.sub)
        ),
        h('div',{className:'top-right'},
          h('div',{className:'welcome-chip'},
            h('div',{className:'welcome-avatar'},'S'),
            h('span',{className:'welcome-name'},'Welcome, Shardul')
          ),
          isDemo&&h('button',{className:'btn btn-ghost btn-sm',onClick:()=>setConn(true)},h('i',{className:'ti ti-plug'}),'Connect'),
          h('button',{className:'btn btn-ghost btn-sm',onClick:fetchData},h('i',{className:`ti ti-refresh${loading?' spin':''}`}),'Refresh'),
          h('button',{className:'btn btn-primary btn-sm',onClick:()=>setBcast(true)},h('i',{className:'ti ti-speakerphone'}),'Broadcast')
        )
      ),
      h('div',{className:'content'},
        page==='overview'       ?h(Overview,         {stats,leads,loading,onSelect:setSelected,isDemo}):
        page==='pipeline'       ?h(PipelinePage,     {leads,loading,onSelect:setSelected}):
        page==='leads'          ?h(LeadsPage,        {leads,loading,onSelect:setSelected,apiBase,isDemo}):
        page==='agent-settings' ?h(AgentSettingsPage,{apiBase,isDemo,showToast}):
        page==='costs'          ?h(CostsPage,        {apiBase,isDemo}):
        page==='campaign-intel' ?h(CampaignIntelPage,{apiBase,isDemo,showToast}):null
      )
    ),
    selected  &&h(LeadModal,             {lead:selected,apiBase,isDemo,onClose:()=>setSelected(null),showToast}),
    showBcast &&h(BroadcastModal,        {apiBase,isDemo,onClose:()=>setBcast(false),showToast,leads}),
    showTmpl  &&h(TemplateCampaignModal, {apiBase,isDemo,onClose:()=>setTmpl(false),showToast}),
    showConn  &&h(ConnectModal,          {apiBase,setApiBase,onClose:()=>setConn(false),showToast}),
    toast     &&h(Toast,{key:toast.id,msg:toast.msg,type:toast.type,onDone:()=>setToast(null)})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
